{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{% static '/css/template.css' %}">
    <style>
        .mapa-area {
            position: relative;
        }

        .busca-mapa-cadastro {
            position: absolute;
            top: 16px;
            left: 62px;
            right: 16px;
            z-index: 500;
            display: flex;
            gap: 8px;
            max-width: 520px;
        }

        .busca-mapa-cadastro input {
            flex: 1;
            min-width: 0;
            border: 1px solid #ddd;
            border-radius: 999px;
            background: white;
            padding: 12px 16px;
            outline: none;
            box-shadow: 0 6px 18px rgba(0,0,0,0.14);
        }

        .busca-mapa-cadastro button {
            width: 46px;
            height: 46px;
            border: none;
            border-radius: 50%;
            background: #ff9900;
            color: white;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(0,0,0,0.16);
        }
    </style>
</head>
<body>
    <div class="mapa-container">
        <div class="mapa-topo">
    <form action="{% url 'cadastrarView' %}">
        <button id="btnVoltarPrincipal" class="btn-voltar" type="submit">
            <i class="fa-solid fa-arrow-left"></i>
        </button>
    </form>
            <div>
                <h1 id="titulo">Selecionar local</h1>
                <p class="subtitulo-mapa">
                    Clique no mapa para marcar o local do buraco
                </p>
            </div>
        </div>
        <div class="mapa-area">
            <form id="formBuscaCadastro" class="busca-mapa-cadastro">
                <input id="inputBuscaCadastro" type="search" placeholder="Buscar rua, bairro ou ponto em São Luís...">
                <button type="submit" aria-label="Buscar no mapa">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </form>
            <div id="mapa"></div>
        </div>
        <div id="linha-endereco-selecionado">
            <h4 class="wmx">Endereço selecionado: </h4>
            <div id="area-endereco">
                <span id="spanEndereco">(Nenhum)</span>
                <span id="statusCarregando" class="simple-loading oculto"></span>
            </div>
        </div>
        
        <form action="{% url 'passarLocalParaCadastroView' %}" method="post">
            {% csrf_token %} 
            <input id="iptHiddenTitulo"      name="titulo"      type="hidden" value="{{titulo}}">
            <input id="iptHiddenDescricao"   name="descricao"   type="hidden" value="{{descricao}}">
            <input id="iptHiddenTamanho"     name="tamanho"     type="hidden" value="{{tamanho}}">
            <input id="iptHiddenCoordenadas" name="coordenadas" type="hidden">
            <input id="iptHiddenEndereco"    name="endereco"    type="hidden">
            <button 
                id="btnConfirmar" 
                class="btn btn-large btn-success centered" 
                disabled>Confirmar</button>
        </form>
    </div>    
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script src="https://kit.fontawesome.com/bcdcf795f9.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
    let iptCoordenadasMapa = document.getElementById('iptHiddenCoordenadas');
    var map = L.map('mapa').setView([-2.5184, -44.2054], 16);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    var marker = null; // Armazena o marcador atual

    function marcarLocal(lat, lng, abrirPopup = true) {
        getEndereco(lat, lng);

        if (marker) {
            map.removeLayer(marker);
        }

        marker = L.marker([lat, lng]);

        marker.addTo(map)
            .bindPopup('Coordenadas: ' + lat.toFixed(4) + ', ' + lng.toFixed(4));

        if (abrirPopup) {
            marker.openPopup();
        }

        iptCoordenadasMapa.value = `${lat}, ${lng}`;
    }

    // Evento de clique no mapa
    map.on('click', function(e) {
        var lat = e.latlng.lat; // Latitude
        var lng = e.latlng.lng; // Longitude
        marcarLocal(lat, lng);
    });

    var coordenadas = [-2.5184, -44.2054];

    var bounds = [
        [-2.4025, -43.8717], // Coordenada sudoeste
        [-2.8044, -44.5679]  // Coordenada nordeste
    ];

    map.setMaxBounds(bounds);

    // // Configuração de zoom para garantir que o zoom não ultrapasse o nível desejado
    map.on('drag', function() {
        map.panInsideBounds(bounds);
    });

    function getEndereco(lat, lng) {
        let url = `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}`;

        document.getElementById('spanEndereco').innerHTML = '';
        document.getElementById('statusCarregando').classList.remove('oculto');
        document.getElementById('btnConfirmar').disabled   = true;

        fetch(url)
            .then(response => response.json())
            .then(data => {
                if (data.display_name) {
                    document.getElementById('statusCarregando').classList.add('oculto');

                    let endereco = data.display_name;
                    let enderecoSplitted = endereco.split(', ');
                    
                    let softEnderecoSplitted = [];
                    softEnderecoSplitted.push(enderecoSplitted[0]);
                    softEnderecoSplitted.push(enderecoSplitted[1]);
                    softEnderecoSplitted.push(enderecoSplitted[2]);
                    softEnderecoSplitted.push(enderecoSplitted[3]);

                    let softEndereco = softEnderecoSplitted.join(', ');
                    softEndereco += ` - ${enderecoSplitted[6]}`;

                    document.getElementById('spanEndereco').innerHTML  = softEndereco;
                    document.getElementById('iptHiddenEndereco').value = softEndereco;
                    document.getElementById('btnConfirmar').disabled   = false;
                } else {
                    alert("Endereço não encontrado!");
                }
            })
            .catch(error => console.error("Erro ao buscar endereço:", error));
    }
    document.getElementById('formBuscaCadastro').addEventListener('submit', async function(event) {
        event.preventDefault();

        const input = document.getElementById('inputBuscaCadastro');
        const termo = input.value.trim();

        if (!termo) {
            return;
        }

        const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&bounded=1&viewbox=-44.57,-2.40,-43.87,-2.80&q=${encodeURIComponent(`${termo}, São Luís, Maranhão, Brasil`)}`;
        const response = await fetch(url);
        const resultados = await response.json();

        if (!resultados.length) {
            input.setCustomValidity('Local não encontrado em São Luís.');
            input.reportValidity();
            input.setCustomValidity('');
            return;
        }

        const resultado = resultados[0];
        const lat = Number(resultado.lat);
        const lng = Number(resultado.lon);

        map.flyTo([lat, lng], 17, { duration: 0.7 });
        marcarLocal(lat, lng);
    });
</script>
</html>
