{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <link rel="stylesheet" href="{% static 'css/principal.css' %}">
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap');
    </style>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

    {% block css %}{% endblock %}
</head>
<body>
    <header>
    <img id="logo" src="{% static 'imgs/Nosso buraco.png' %}" alt="Logo do site" class="logo">

    <form class="barra-pesquisa" action="{% url 'pesquisaView' %}" method="get">
        <input 
            type="text" 
            name="q" 
            placeholder="Pesquisar usuário ou bairro..."
        >
        <button type="submit">
            <i class="fa-solid fa-magnifying-glass"></i>
        </button>
    </form>
</header>
    <main>
        <div id="barra-lateral">
            <ul id="lista-botoes">
    <li>
        <form action="{% url 'inicioView' %}">
            <button type="submit">Início</button>
        </form>
    </li>

    <li> <button>Mais curtidos</button> </li>

    <li>
        <form action="{% url 'verBuracosView' %}">
            <button type="submit">Ver buracos</button>
        </form>
    </li>

    <li>
        <form action="{% url 'cadastrarView' %}">
            <button type="submit">Adicionar buraco</button>
        </form>
    </li>

    <li>
        <form action="{% url 'verNoMapaView' %}">
            <button type="submit">Ver no mapa</button>
        </form>
    </li>

    <li>
        <form action="{% url 'perfilView' %}">
            <button type="submit">Ver perfil</button>
        </form>
    </li>

    <li>
        <form action="{% url 'deslogar' %}">
            <button id="btnDeslogar" type="submit">Sair</button>
        </form>
    </li>
</ul>
        </div>
        <div id="conteudo" class="container">
            {% block content %}{% endblock %}
        </div>
    </main>
</body>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script src="https://kit.fontawesome.com/bcdcf795f9.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
</html>
